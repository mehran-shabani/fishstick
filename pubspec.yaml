name: blood_sugar_tracker
description: A Flutter app for tracking blood sugar with Persian calendar support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shamsi_date: ^1.0.1
  fl_chart: ^0.65.0
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
